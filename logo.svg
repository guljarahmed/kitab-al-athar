<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Closed book with ornate cover and crescent -->
  <!-- Main book body -->
  <rect x="10" y="8" width="28" height="34" rx="2" fill="none" stroke="#ffffff" stroke-width="1.6"/>
  <!-- Book spine -->
  <line x1="14" y1="8" x2="14" y2="42" stroke="#ffffff" stroke-width="1.2"/>
  <!-- Cover ornament - diamond -->
  <polygon points="27,17 33,23 27,29 21,23" fill="none" stroke="#ffffff" stroke-width="1"/>
  <!-- Inner diamond -->
  <polygon points="27,19 31,23 27,27 23,23" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.5"/>
  <!-- Crescent in center -->
  <circle cx="27" cy="23" r="2" fill="none" stroke="#ffffff" stroke-width="0.8"/>
  <circle cx="28" cy="22.2" r="1.5" fill="rgba(74,93,35,1)" stroke="none"/>
  <!-- Top and bottom ornament lines -->
  <line x1="19" y1="12" x2="35" y2="12" stroke="rgba(255,255,255,0.4)" stroke-width="0.6"/>
  <line x1="19" y1="14" x2="35" y2="14" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <line x1="19" y1="34" x2="35" y2="34" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <line x1="19" y1="36" x2="35" y2="36" stroke="rgba(255,255,255,0.4)" stroke-width="0.6"/>
</svg>
